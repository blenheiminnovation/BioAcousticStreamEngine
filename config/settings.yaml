# Ecoacoustics monitoring configuration

audio:
  device: null          # null = system default; set to device index or name to override
  channels: 1
  chunk_duration: 3.0   # seconds per analysis window
  max_queue_size: 20    # chunks buffered before oldest are dropped (~60s headroom at 3s/chunk)

classifiers:
  active:
    - bird

bird:
  sample_rate: 48000
  min_confidence: 0.35
  latitude: 51.8403     # Blenheim Palace
  longitude: -1.3625

bat:
  sample_rate: 256000
  min_confidence: 0.6
  freq_min_hz: 15000
  freq_max_hz: 150000

insect:
  sample_rate: 44100
  min_confidence: 0.5
  freq_min_hz: 2000
  freq_max_hz: 20000

soil:
  sample_rate: 22050
  min_confidence: 0.4
  energy_threshold: 0.01
  freq_min_hz: 50
  freq_max_hz: 2000

# Listening schedule (times relative to sunrise/sunset at configured lat/lon)
schedule:
  timezone: "Europe/London"
  windows:
    - name: dawn_chorus       # Robin starts before sunrise; peak bird song
      anchor: sunrise
      offset_mins: -30
      duration_mins: 150

    - name: morning_song      # Secondary activity peak
      anchor: sunrise
      offset_mins: 150
      duration_mins: 60

    - name: dusk              # Evening song / roost calls
      anchor: sunset
      offset_mins: -60
      duration_mins: 90

  # Species that unlock extra listening windows when detected
  adaptive:
    nocturnal:                # adds a 60-min window at 23:00 if any of these seen
      - "Tawny Owl"
      - "Barn Owl"
      - "Little Owl"
      - "European Nightjar"
    early_morning:            # extends dawn window by 30 min if detected
      - "Common Nightingale"
      - "Song Thrush"

clips:
  dir: "output/clips"                   # root folder; one sub-folder per species
  species_db: "output/known_species.json"  # all-time species registry
  max_per_species: 100                  # rotate out lowest-confidence clips beyond this

output:
  console: true
  detections_csv: "output/detections.csv"   # one row per detection
  sessions_csv: "output/sessions.csv"       # one row per session-species summary
  min_confidence: 0.35
